services:
  postgres:
    image: postgres:15-alpine
    container_name: scala-uvv-db
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-scala_uvv}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: scala-uvv-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
